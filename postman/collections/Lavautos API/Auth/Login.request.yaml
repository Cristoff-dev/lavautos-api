$kind: http-request
name: Login
description: |-
  Autenticación de usuario para obtener token JWT.
  El token se guarda automáticamente en la variable `token` para uso en otros requests.
method: POST
url: '{{base_url}}{{api_base}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{user_email}}",
      "password": "{{user_password}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });

      pm.test("Response contains token", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("token");
          
          // Guardar token para uso en otros requests
          if (jsonData.token) {
              pm.collectionVariables.set("token", jsonData.token);
              console.log("Token guardado exitosamente");
          }
      });

      pm.test("Response contains user data", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("user");
          if (jsonData.user) {
              pm.expect(jsonData.user).to.have.property("id");
              pm.expect(jsonData.user).to.have.property("email");
          }
      });
