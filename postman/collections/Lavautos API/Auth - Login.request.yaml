$kind: http-request
name: 'Auth - Login'
method: POST
url: '{{base_url}}{{api_base_path}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@example.com",
      "password": "password"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200/401/400 (depends on seeded data)', function () {
        pm.expect([200, 400, 401]).to.include(pm.response.code);
      });

      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });

      // If login succeeds, try to capture token-like fields
      if (pm.response.code === 200) {
        const json = pm.response.json();
        const token = json?.token || json?.accessToken || json?.data?.token || json?.data?.accessToken;
        if (token) {
          pm.environment.set('auth_token', token);
        }
      }
