$kind: http-request
name: Create Provider
description: Crea un nuevo proveedor
method: POST
url: '{{base_url}}{{api_base}}/providers'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Proveedor Test",
      "contactName": "Juan Pérez",
      "phone": "+58 412-1234567",
      "email": "proveedor@test.com",
      "address": "Av. Principal, Local 123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });

      pm.test("Created provider has required fields", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("name");
          pm.expect(jsonData.name).to.eql("Proveedor Test");
          
          // Guardar ID para tests de update/delete
          pm.collectionVariables.set("provider_id", jsonData.id);
      });
