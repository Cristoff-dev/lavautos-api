$kind: http-request
name: Get All Providers
description: Obtiene todos los proveedores activos
method: GET
url: '{{base_url}}{{api_base}}/providers'
order: 1000
headers:
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });

      pm.test("Response is an array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
      });

      pm.test("Providers have required fields", function () {
          const jsonData = pm.response.json();
          if (jsonData.length > 0) {
              const provider = jsonData[0];
              pm.expect(provider).to.have.property("id");
              pm.expect(provider).to.have.property("name");
              pm.expect(provider).to.have.property("isActive");
              
              // Guardar primer ID para tests posteriores
              pm.collectionVariables.set("provider_id", provider.id);
          }
      });
