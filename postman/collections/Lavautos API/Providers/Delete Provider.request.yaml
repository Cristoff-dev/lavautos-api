$kind: http-request
name: Delete Provider
description: Elimina (soft delete) un proveedor
method: DELETE
url: '{{base_url}}{{api_base}}/providers/:id'
order: 5000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '{{provider_id}}'
    description: ID del proveedor a eliminar
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 500", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 500]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });

      if (pm.response.code === 200) {
          pm.test("Delete confirmation message", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("mensaje");
              pm.expect(jsonData.mensaje).to.include("eliminado");
          });
      }
