$kind: http-request
name: Update Provider
description: Actualiza un proveedor existente
method: PUT
url: '{{base_url}}{{api_base}}/providers/:id'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '{{provider_id}}'
    description: ID del proveedor a actualizar
body:
  type: json
  content: |-
    {
      "name": "Proveedor Actualizado",
      "contactName": "María García",
      "phone": "+58 414-7654321",
      "email": "proveedor.actualizado@test.com",
      "address": "Calle Nueva, Edificio 456"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 500", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 500]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });

      if (pm.response.code === 200) {
          pm.test("Updated provider has correct data", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("id");
              pm.expect(jsonData.name).to.eql("Proveedor Actualizado");
          });
      }
