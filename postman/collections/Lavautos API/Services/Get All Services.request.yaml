$kind: http-request
name: Get All Services
description: Obtiene todos los servicios activos
method: GET
url: '{{base_url}}{{api_base}}/services'
order: 1000
headers:
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });

      pm.test("Response is an array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
      });

      pm.test("Services have required fields", function () {
          const jsonData = pm.response.json();
          if (jsonData.length > 0) {
              const service = jsonData[0];
              pm.expect(service).to.have.property("id");
              pm.expect(service).to.have.property("name");
              pm.expect(service).to.have.property("price");
              pm.expect(service).to.have.property("isActive");
              
              // Guardar primer ID para tests posteriores
              pm.collectionVariables.set("service_id", service.id);
          }
      });
