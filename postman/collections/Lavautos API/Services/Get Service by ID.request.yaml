$kind: http-request
name: Get Service by ID
description: Obtiene un servicio específico por su ID
method: GET
url: '{{base_url}}{{api_base}}/services/:id'
order: 2000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '{{service_id}}'
    description: ID del servicio a consultar
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 404", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });

      if (pm.response.code === 200) {
          pm.test("Service has required fields", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("id");
              pm.expect(jsonData).to.have.property("name");
              pm.expect(jsonData).to.have.property("price");
              pm.expect(jsonData).to.have.property("isActive");
          });
      }

      if (pm.response.code === 404) {
          pm.test("Error message is present", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("error");
          });
      }
