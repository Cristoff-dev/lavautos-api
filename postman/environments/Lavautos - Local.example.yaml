# Lavautos API - Environment Variables
# Copia este archivo a "Lavautos - Local.yaml" y ajusta los valores según tu configuración

name: Lavautos - Local
values:
  - key: base_url
    value: 'http://localhost:3000'
    enabled: true
    type: default
  - key: api_base
    value: '/api/lavautos'
    enabled: true
    type: default
  - key: token
    value: ''
    enabled: true
    type: secret
  - key: service_id
    value: ''
    enabled: true
    type: default
  - key: provider_id
    value: ''
    enabled: true
    type: default
  - key: user_email
    value: 'admin@lavautos.com'
    enabled: true
    type: default
  - key: user_password
    value: 'tu_password_aqui'
    enabled: true
    type: secret
